<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신비로운 타로 운세 - 당신의 운명을 확인하세요</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars-container"></div>
    
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="date-display" id="current-date">2024년 00월 00일</div>
            <h1 class="animate-fade-in"><i class="fa-solid fa-moon"></i> 신비로운 타로 운세</h1>
            
            <!-- Mode Selection -->
            <div class="mode-selector">
                <button id="mode-1" class="mode-btn active" onclick="setMode(1)">오늘의 타로 (1장)</button>
                <button id="mode-3" class="mode-btn" onclick="setMode(3)">운명의 흐름 (3장)</button>
            </div>

            <p id="selection-status" class="subtitle animate-fade-in-delay">오늘 하루 당신에게 찾아올 행운의 메시지를 확인하세요.</p>
            <button id="view-results-btn" class="btn-primary" style="display: none; margin: 20px auto;">결과 확인하기</button>
        </header>

        <!-- Tarot Board -->
        <main class="tarot-board">
            <div id="card-container" class="card-grid">
                <!-- JavaScript로 카드가 렌더링 됩니다 -->
            </div>
        </main>

        <!-- Integrated Result Modal -->
        <div id="result-modal" class="modal">
            <div id="modal-content" class="modal-content-today">
                <span class="close-btn">&times;</span>
                <div id="result-area">
                    <!-- JavaScript로 1장 또는 3장 결과가 동적으로 생성됩니다 -->
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
