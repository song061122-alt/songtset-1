<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신비로운 타로 운세 - 당신의 운명을 확인하세요</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars-container"></div>
    
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="animate-fade-in"><i class="fa-solid fa-moon"></i> 신비로운 타로 운세</h1>
            <p class="subtitle animate-fade-in-delay">눈을 감고 당신의 질문을 생각하며 카드를 한 장 선택해 보세요.</p>
        </header>

        <!-- Tarot Board -->
        <main class="tarot-board">
            <div id="card-container" class="card-grid">
                <!-- JavaScript로 카드가 렌더링 됩니다 -->
            </div>
        </main>

        <!-- Result Modal -->
        <div id="result-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <div class="result-details">
                    <div class="result-card-view">
                        <img id="result-card-img" src="" alt="선택된 카드">
                    </div>
                    <div class="result-text">
                        <h2 id="result-card-name">카드 이름</h2>
                        <div class="divider"></div>
                        <p id="result-card-meaning">카드 해석이 여기에 표시됩니다.</p>
                        <button class="btn-retry" onclick="location.reload()">다시 확인하기</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
